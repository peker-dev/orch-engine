{
  "meta": {
    "domain_id": "web",
    "version": "0.2.0",
    "display_name": "Web (Responsive)",
    "summary": "PC/모바일 반응형 웹사이트 및 웹앱 개발 워크플로. 정적 사이트(HTML/CSS/JS)부터 SPA/SSR 프레임워크까지. 접근성(WCAG AA) + Lighthouse 기준 내장. 포트폴리오/homepage 같은 GitHub Pages 정적 사이트부터 풀스택 웹앱까지 지원.",
    "default_mode": "greenfield",
    "maturity": "calibrated"
  },
  "supports": {
    "modes": ["greenfield", "retrofit", "resume"],
    "project_types": [
      "static_site",
      "portfolio_site",
      "landing_page",
      "spa_client",
      "ssr_app",
      "hybrid_jamstack"
    ],
    "platforms": ["browser_desktop", "browser_mobile"],
    "runtime_profiles": ["node_dev_server", "static_hosting", "github_pages"],
    "verification_profiles": ["html_validator", "a11y_gate", "lighthouse_gate", "responsive_viewport_gate"]
  },
  "intake": {
    "required": [
      "site_type (static_site / spa / ssr / landing_page / portfolio_site)",
      "target_browsers (modern evergreen / legacy IE11 등)",
      "responsive_required (기본 true — PC/모바일 둘 다 지원)",
      "hosting (github_pages / static_host / node_server)"
    ],
    "optional": [
      "framework (react / vue / svelte / next / astro / none=vanilla)",
      "css_strategy (tailwind / vanilla_css / css_modules / scss)",
      "locales (ko, en, ...)",
      "seo_required (default: true)",
      "analytics (opt-in; default 없음)"
    ],
    "auto_detect": [
      "index.html",
      "package.json",
      "vite.config.* / next.config.* / astro.config.*",
      "README.md",
      "public/ or src/ 구조"
    ],
    "ask_when_missing": [
      "If no site_type: ask static / spa / ssr / portfolio 중 하나",
      "If no framework: vanilla HTML/CSS로 진행 여부 확인"
    ],
    "normalize_rules": [
      "이미지 경로 상대 경로 권장 (GitHub Pages 배포 시 절대경로 깨짐)",
      "파일명은 ASCII + 하이픈 (한글 파일명은 URL 인코딩 이슈로 지양)",
      "HTML lang 속성 명시 (ko / en)",
      "CSS 파일 kebab-case"
    ]
  },
  "outputs": {
    "primary": [
      "index.html + 하위 페이지 *.html (static)",
      "src/**/*.{js,ts,jsx,tsx,vue,svelte} (SPA/SSR)",
      "styles/**/*.css 또는 src/styles/",
      "public/** (정적 에셋)",
      "screenshots/** (포트폴리오 증빙 이미지)"
    ],
    "secondary": [
      "README.md (사이트 소개 + 로컬 실행/배포 방법)",
      "package.json (의존성 + 스크립트)",
      "memory/handoff.md",
      ".gitignore"
    ],
    "review_artifacts": [
      "lighthouse_report.json (mobile + desktop 각각)",
      "a11y_report.json (axe-core 결과)",
      "viewport_check.md (375px / 768px / 1280px 렌더 확인)",
      "html_validator_result.txt"
    ],
    "completion_signal": [
      "HTML validator 통과 (W3C)",
      "viewport 375px에서 가로 스크롤 없음",
      "Lighthouse 점수 90+ (performance / a11y / best-practices / seo)",
      "WCAG AA 대비비 4.5:1 이상",
      "모든 img에 alt, heading 계층 올바름"
    ]
  },
  "scaffold": {
    "required_structure": [
      "project-root.md",
      "README.md",
      "index.html 또는 src/index.{html,tsx}",
      ".gitignore",
      "memory/handoff.md",
      "memory/coding-rules.md"
    ],
    "optional_structure": [
      "src/components/",
      "src/styles/",
      "src/pages/",
      "public/",
      "screenshots/",
      "tests/"
    ],
    "seed_files": [
      "README.md 템플릿",
      ".gitignore (node_modules/dist/build)",
      "index.html (meta viewport + lang 포함 뼈대)"
    ],
    "preserve_rules": [
      "사용자 콘텐츠 (텍스트/이미지/경력 서류 등): 동의 없이 삭제/수정 금지",
      "이미 배포된 페이지: URL 경로 변경은 링크 끊김 유발하므로 신중",
      "screenshots/ 같은 증빙 이미지는 원본 유지, 가공본은 별도 파일",
      "브랜드 컬러/로고/폰트: 디자인 결정 문서 없으면 변경 금지"
    ],
    "bootstrap_steps": [
      "1. site_type 확정 (static / spa / ssr)",
      "2. framework 선택 또는 vanilla 확정",
      "3. index.html 반응형 뼈대 생성 (<meta viewport> + max-width container + 기본 media query)",
      "4. README 초안 (사이트 목적 + 로컬 실행/배포 방법)",
      "5. .gitignore 프레임워크별 템플릿 적용"
    ]
  },
  "planning": {
    "goal_split_rules": [
      "페이지 단위 분할 (index / about / projects / ... 각각 task)",
      "반응형 대응은 페이지 task에 포함 (별도 task 금지 — 처음부터 같이)",
      "접근성 개선은 해당 페이지 task 안에서 처리"
    ],
    "task_unit_rules": [
      "1 task = 1 페이지 구현 OR 1 컴포넌트 OR 1 스타일 리팩터 OR 1 a11y 개선",
      "task title은 페이지/컴포넌트 명 + 의도 (예: `projects.html: 카드 레이아웃 + 반응형`)"
    ],
    "priority_rules": [
      "랜딩/index.html 우선 → 핵심 콘텐츠 페이지 → 부가 페이지",
      "접근성 hard fail은 최우선",
      "Lighthouse < 80은 개선 우선순위 올림",
      "디자인 디테일(폰트 미세 조정, hover 효과)은 마지막"
    ],
    "acceptance_rules": [
      "HTML 유효성 통과",
      "meta viewport 존재",
      "반응형 동작 (375px/768px/1280px 검증)",
      "WCAG AA 준수 (대비비, alt, heading 계층, lang)",
      "Lighthouse 90+ (mobile/desktop 둘 다)"
    ],
    "replan_triggers": [
      "접근성 hard fail 발생",
      "Lighthouse 점수 급락",
      "디자인 방향 결정 변경 (브랜드 컬러/레이아웃 철회)",
      "호스팅 플랫폼 변경 (GitHub Pages → Vercel 등)"
    ]
  },
  "builder": {
    "execution_rules": [
      "모든 HTML에 `<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">` 필수",
      "`<html lang=\"ko\">` (또는 해당 언어) 필수",
      "semantic HTML 사용: header / nav / main / article / section / footer",
      "모든 img에 alt (장식용이면 alt=\"\")",
      "heading 계층: h1은 페이지당 1개, h2 이하 순차 (레벨 건너뛰기 금지)",
      "반응형 CSS: max-width container + @media (max-width: 768px) 이상 break",
      "대비비 WCAG AA (4.5:1 본문, 3:1 대형 텍스트)",
      "외부 스크립트는 defer/async, 인라인 스크립트 최소화",
      "폰트: 시스템 폰트 또는 1~2개 웹폰트만 (로딩 성능)"
    ],
    "change_scope_rules": [
      "새 페이지는 새 HTML 파일 (또는 새 라우트)",
      "기존 페이지 수정은 diff 최소화 (섹션 단위만)",
      "CSS 전역 변경은 영향받는 페이지 명시",
      "브랜드 요소(로고/컬러) 변경은 사용자 승인 필수"
    ],
    "artifact_rules": [
      "이미지는 responsive (srcset 또는 최소 모바일/데스크톱 2벌)",
      "스크린샷은 WebP 또는 최적화된 PNG/JPG",
      "CSS 변수로 브랜드 토큰 관리 (--color-primary 등)"
    ],
    "self_check_rules": [
      "HTML validator 통과 확인",
      "viewport 375px에서 가로 스크롤 없음",
      "alt 누락 0",
      "heading 계층 위반 0",
      "lang 속성 존재",
      "대비비 WCAG AA",
      "감정 수식어 없는 전문 톤 (포트폴리오 예시 기준)"
    ],
    "handoff_back_rules": [
      "브랜드/디자인 결정 필요 → handoff(approve_gate)",
      "대형 콘텐츠 삭제/변경 → handoff(review_only)",
      "프레임워크 전환 제안 → handoff(replan_pass)"
    ]
  },
  "verify_functional": {
    "required_checks": [
      "HTML 파싱 에러 0 (W3C validator)",
      "모든 HTML에 `<meta viewport>` 존재",
      "모든 HTML에 `<html lang>` 존재",
      "모든 `<img>`에 `alt` 속성",
      "각 페이지 `<h1>` 정확히 1개, h2 이하 계층 순차",
      "CSS에 @media query 또는 container 반응형 증거",
      "내부 링크 대상 유효 (상대경로)",
      "외부 의존성 최소 (CDN은 승인된 것만)"
    ],
    "ground_truth_sources": [
      "W3C HTML validator",
      "Lighthouse CLI (mobile + desktop)",
      "axe-core / Lighthouse a11y 카테고리",
      "기존 포트폴리오(homepage) 사이트 패턴"
    ],
    "execution_steps": [
      "1. HTML 파서로 각 페이지 구조 추출",
      "2. grep: meta viewport / html lang / img alt",
      "3. heading 계층 검사",
      "4. CSS에서 @media query 검증",
      "5. (옵션) headless browser로 375px/1280px 렌더 캡처"
    ],
    "pass_fail_rules": [
      "hard fail: viewport 누락, lang 누락, alt 누락, h1 2개 이상, HTML 파싱 에러",
      "hard fail: 반응형 증거 없음 (고정 px only)",
      "soft fail: Lighthouse < 90, 대비비 WCAG AA 미달, 감정 수식어 다수"
    ],
    "evidence_required": [
      "위반 파일명:라인 + 인용",
      "Lighthouse 결과 JSON 링크",
      "스크린샷 (375px / 1280px 각각)"
    ]
  },
  "verify_human": {
    "review_axes": [
      "information_architecture (정보 계층 + 흐름)",
      "readability (본문 가독성, 폰트 크기, 행간)",
      "mobile_thumb_zone (엄지 조작 편의)",
      "brand_tone (브랜드 일관성, 감정 수식어 배제)",
      "accessibility_feel (스크린 리더 통과, 키보드 네비)",
      "visual_balance (여백, 타이포, 대비)"
    ],
    "personas": [
      "UX Designer: 정보 계층과 사용자 흐름",
      "A11y Engineer: WCAG 준수와 스크린 리더 경험",
      "Frontend Engineer: 구조/성능/코드 품질",
      "Visual Designer: 여백/타이포/컬러 밸런스",
      "Mobile User: 엄지 조작 편의와 모바일 로딩 체감"
    ],
    "reference_comparison": [
      "참고 사이트 (포트폴리오/homepage) 톤과 일관성",
      "동일 프로젝트 내 기존 페이지와 일관된 디자인 토큰"
    ],
    "quality_rubric": [
      "A: 모든 축 통과 + 반응형 + a11y + Lighthouse 90+",
      "B: 경미 개선 (한 축 약함)",
      "C: 2+ 축 약함 또는 모바일에서 사용 불편",
      "reject: a11y hard fail, 반응형 깨짐, 브랜드 톤 이탈"
    ],
    "approval_rules": [
      "C 이하 → result=changes_made",
      "a11y hard fail 또는 반응형 깨짐 → result=rejected",
      "A + 5 persona 동의 → result=approved"
    ]
  },
  "tools": {
    "required_tools": [
      "modern browser (Chrome/Firefox/Edge)",
      "HTML validator (W3C)",
      "CSS/DOM inspector (DevTools)"
    ],
    "optional_tools": [
      "Lighthouse CLI",
      "axe-core",
      "Playwright / Cypress (e2e)",
      "Figma (디자인 참조)",
      "ImageOptim / squoosh (이미지 최적화)"
    ],
    "fallback_tools": [
      "DevTools device mode (수동 반응형 확인)",
      "Online validators (validator.w3.org)"
    ],
    "tool_run_rules": [
      "Lighthouse는 mobile 프리셋 + desktop 프리셋 각각 실행",
      "a11y는 axe-core 또는 Lighthouse a11y 카테고리 (중복 OK)",
      "screenshot은 표준 viewport (375/768/1280)에서"
    ],
    "tool_output_policy": [
      "Lighthouse / a11y 결과는 review_artifacts로 커밋",
      "스크린샷은 screenshots/ 아래 타임스탬프 포함 파일명",
      "외부 도구 출력은 날짜/버전 주석"
    ]
  },
  "references": {
    "required_references": [
      "README.md",
      "memory/handoff.md",
      "memory/coding-rules.md",
      "WCAG 2.1 AA 기준"
    ],
    "optional_references": [
      "사용자 본인의 이전 포트폴리오/샘플 사이트 (있을 경우)",
      "Figma 디자인 (제공되면)",
      "프레임워크 공식 문서",
      "참고 사이트 스크린샷"
    ],
    "discovery_rules": [
      "세션 시작 시 README → index.html → 다른 페이지 순",
      "스타일 변경 시 기존 CSS 변수/토큰 먼저 확인",
      "새 페이지 작성 시 기존 페이지 레이아웃 참조"
    ],
    "comparison_rules": [
      "동일 프로젝트 내 기존 페이지와 디자인 토큰 일관성",
      "참고 사이트의 정보 계층과 대조"
    ],
    "citation_rules": [
      "외부 인용은 출처 URL + 접근 날짜",
      "디자인 결정은 README 또는 docs/design.md에 기록"
    ]
  },
  "scoring": {
    "dimensions": [
      "html_validity",
      "responsiveness",
      "accessibility",
      "lighthouse_performance",
      "brand_consistency",
      "code_quality"
    ],
    "weights": {
      "html_validity": 0.15,
      "responsiveness": 0.2,
      "accessibility": 0.25,
      "lighthouse_performance": 0.15,
      "brand_consistency": 0.15,
      "code_quality": 0.1
    },
    "thresholds": {
      "functional_pass": 0.85,
      "human_pass": 0.75
    },
    "blocking_failures": [
      "meta viewport 누락",
      "html lang 누락",
      "img alt 누락",
      "h1 2개 이상 또는 누락",
      "HTML 파싱 에러",
      "반응형 증거 없음 (고정 px only)",
      "WCAG critical 위반 (키보드 접근 불가, 대비비 극단적 미달)"
    ],
    "improvement_rules": [
      "functional fail: 파일:라인 + 위반 규칙 + 수정 예시 코드",
      "human fail: 해당 persona + rubric 등급 + 최소 수정안"
    ]
  },
  "limits": {
    "cycle_limits": {
      "max_cycles": 5
    },
    "time_budget_rules": [
      "페이지 1편 구현 ~30분",
      "Lighthouse 실행 모바일+데스크톱 ~5분",
      "a11y 스캔 ~3분"
    ],
    "cost_budget_rules": [
      "외부 CDN 스크립트 지양 (로컬 번들 우선)",
      "이미지는 사전 최적화 후 커밋"
    ],
    "parallelism_rules": [
      "동시 페이지 개발 최대 2개 (CSS 충돌 방지)",
      "Lighthouse/a11y 도구는 순차 실행"
    ],
    "auto_stop_rules": {
      "stop_on_stagnation": true,
      "stop_on_a11y_fail_twice": true,
      "stop_on_validator_fail_twice": true
    }
  },
  "recovery": {
    "failure_classes": [
      "validator_fail",
      "a11y_fail",
      "responsive_broken",
      "lighthouse_low",
      "brand_drift"
    ],
    "retry_rules": [
      "validator_fail: 해당 태그만 수정",
      "a11y_fail: alt 추가, 대비비 조정, aria-label 보강",
      "responsive_broken: viewport meta 확인 + media query 추가",
      "lighthouse_low: 이미지 최적화, defer/async 적용, 외부 의존 제거"
    ],
    "fallback_routes": [
      "디자인 결정 필요 시 handoff(approve_gate)",
      "프레임워크 제약 부딪히면 vanilla HTML/CSS 폴백 검토"
    ],
    "resume_rules": [
      "페이지 진행 중이면 파일 유지, 다음 섹션부터 재개",
      "빌드 산출물(dist/build)은 재생성 가능 — 삭제 후 재빌드 허용"
    ],
    "escalation_rules": [
      "a11y hard fail 2회 연속 → handoff(approve_gate)",
      "브랜드 방향 불일치 지속 → handoff(review_only)"
    ]
  },
  "guardrails": {
    "approval_required_actions": [
      "브랜드 컬러/로고/폰트 변경",
      "도메인 구조 변경 (URL 경로)",
      "콘텐츠 대량 삭제 또는 대체",
      "개인정보(이메일/전화/주소) 추가 또는 변경",
      "analytics/추적 스크립트 추가",
      "외부 CDN 추가",
      "실제 배포 (GitHub Pages push, Vercel deploy 등)"
    ],
    "forbidden_actions": [
      "meta viewport 제거",
      "html lang 제거",
      "img alt 속성 제거",
      "고정 px-only 레이아웃 (반응형 무시)",
      "감정 수식어 남발 (좋다/훌륭하다/완벽하다 등)",
      "동의 없는 개인정보 노출",
      "CDN 스크립트 무단 추가",
